<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Boss Key · Scratch</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      user-select: none;
    }

    #game-view, #cover-view {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #game-view {
      z-index: 1;
    }
    #cover-view {
      z-index: 2;
      display: none;
      background: #0d0d1a;
    }

    #game-view iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      pointer-events: auto;
    }

    #cover-view img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #0d0d1a;
    }

    /* KEY TRAP - hidden but always focused */
    #key-trap {
      position: fixed;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
      border: none;
      outline: none;
      background: transparent;
    }

    /* Setup overlay */
    #upload-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 25, 0.94);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      color: #fff;
      font-family: Arial, sans-serif;
      backdrop-filter: blur(3px);
    }

    .setup-box {
      background: #17173a;
      border: 1px solid #3a3a6a;
      border-radius: 18px;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 360px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
    }

    .setup-box h2 {
      font-size: 1.4rem;
      color: #7effc5;
      text-align: center;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .setup-box p {
      font-size: 0.85rem;
      color: #9a9ac0;
      text-align: center;
      margin-top: -6px;
    }

    .setup-box label {
      font-size: 0.82rem;
      color: #c8c8f0;
      font-weight: 500;
      margin-top: 4px;
    }

    .setup-box input[type="file"],
    .setup-box input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 9px;
      border: 1px solid #3a3a6a;
      background: #0f0f28;
      color: #eee;
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
    }

    .setup-box input[type="file"]::file-selector-button {
      background: #2a2a5a;
      color: #b0b0f0;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      margin-right: 12px;
      cursor: pointer;
    }

    .setup-box input[type="text"] {
      text-transform: uppercase;
      text-align: center;
      letter-spacing: 2.5px;
      font-weight: 600;
      background: #0a0a1e;
      border-color: #5a5a9a;
    }

    .setup-box input[type="text"]:focus {
      border-color: #7effc5;
      box-shadow: 0 0 0 2px rgba(126, 255, 197, 0.2);
    }

    .game-preview {
      background: #12122e;
      border: 1px solid #2e2e5a;
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .game-preview span {
      font-size: 1.8rem;
    }

    .game-preview div {
      font-size: 0.85rem;
      color: #b0b0d0;
    }

    .game-preview strong {
      color: #7effc5;
      font-size: 0.95rem;
    }

    .setup-box button {
      padding: 12px;
      background: #7effc5;
      color: #0d0d22;
      font-weight: bold;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 6px;
      transition: 0.2s;
      letter-spacing: 0.5px;
    }

    .setup-box button:hover {
      background: #5de8ad;
      transform: scale(0.98);
    }

    /* HUD */
    #hud {
      position: fixed;
      bottom: 14px;
      right: 16px;
      z-index: 15;
      background: rgba(0, 0, 0, 0.7);
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 20px;
      pointer-events: none;
      font-family: monospace;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    #hud span {
      color: #7effc5;
      font-weight: bold;
    }

    /* Click shield - forces focus back */
    #click-shield {
      position: fixed;
      inset: 0;
      z-index: 3;
      background: transparent;
      pointer-events: none;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- SETUP OVERLAY -->
  <div id="upload-overlay">
    <div class="setup-box">
      <h2>⚙️ Boss Key</h2>
      <p>Pick a cover photo &amp; set your panic key</p>

      <div class="game-preview">
        <span>🎮</span>
        <div>
          <strong>Scratch Game</strong><br>
          <span style="color:#888;">pre‑loaded · ready</span>
        </div>
      </div>

      <label>📷 Cover photo (notes / homework)</label>
      <input type="file" id="img-upload" accept="image/*" />

      <label>⌨️ Panic key — tap then press any key</label>
      <input type="text" id="key-display" placeholder="tap & press a key" readonly />
      <input type="hidden" id="key-code" />

      <button id="start-btn">▶ Start</button>
    </div>
  </div>

  <!-- GAME VIEW -->
  <div id="game-view">
    <iframe
      id="game-frame"
      src="https://scratch.mit.edu/projects/345617740/embed"
      allowtransparency="true"
      allowfullscreen
      scrolling="no">
    </iframe>
    <div id="hud">🔒 <span id="hud-key">?</span> to hide</div>
  </div>

  <!-- COVER VIEW -->
  <div id="cover-view">
    <img id="cover-img" src="" alt="cover" />
  </div>

  <!-- KEY TRAP - always focused -->
  <input id="key-trap" type="text" />

  <!-- CLICK SHIELD -->
  <div id="click-shield"></div>

  <script>
    (function() {
      const overlay    = document.getElementById('upload-overlay');
      const imgUpload  = document.getElementById('img-upload');
      const keyDisplay = document.getElementById('key-display');
      const keyCode    = document.getElementById('key-code');
      const startBtn   = document.getElementById('start-btn');
      const coverImg   = document.getElementById('cover-img');
      const coverView  = document.getElementById('cover-view');
      const hudKey     = document.getElementById('hud-key');
      const keyTrap    = document.getElementById('key-trap');
      const clickShield = document.getElementById('click-shield');

      let panicKey = '';
      let coverVisible = false;
      let isActive = false;

      // ----- capture panic key (from the input) -----
      keyDisplay.addEventListener('keydown', (e) => {
        e.preventDefault();
        const key = e.key;
        let display = key;
        if (key === ' ') display = 'SPACE';
        else if (key === 'Escape') display = 'ESC';
        else if (key === 'Control') display = 'CTRL';
        else if (key === 'Shift') display = 'SHIFT';
        else if (key === 'Alt') display = 'ALT';
        else if (key === 'Meta') display = 'WIN';
        else display = key.toUpperCase();

        keyDisplay.value = display;
        keyCode.value = key;
        panicKey = key;
        hudKey.textContent = display;
      });

      // ----- start button -----
      startBtn.addEventListener('click', () => {
        const file = imgUpload.files[0];
        const key  = keyCode.value;

        if (!file) {
          alert('📷 Please upload a cover photo first!');
          return;
        }
        if (!key) {
          alert('⌨️ Tap the panic key box and press a key!');
          return;
        }

        panicKey = key;
        hudKey.textContent = key === ' ' ? 'SPACE' : key.toUpperCase();
        isActive = true;

        const reader = new FileReader();
        reader.onload = (ev) => {
          coverImg.src = ev.target.result;
          overlay.style.display = 'none';
          coverVisible = false;
          coverView.style.display = 'none';
          
          // Focus the key trap
          setTimeout(() => {
            keyTrap.focus();
          }, 100);
        };
        reader.readAsDataURL(file);
      });

      // ----- THE MAGIC: Force focus back to key trap -----
      function forceFocus() {
        if (!isActive || overlay.style.display !== 'none') return;
        if (document.activeElement !== keyTrap) {
          keyTrap.focus();
        }
      }

      // Focus on every click anywhere
      document.addEventListener('click', forceFocus);
      document.addEventListener('touchstart', forceFocus);
      
      // Focus on every keydown (catches if focus shifts)
      document.addEventListener('keydown', forceFocus);

      // Focus on iframe load
      document.getElementById('game-frame').addEventListener('load', () => {
        setTimeout(forceFocus, 200);
      });

      // Aggressive: focus every 500ms
      setInterval(() => {
        if (isActive && overlay.style.display === 'none') {
          if (document.activeElement !== keyTrap) {
            keyTrap.focus();
          }
        }
      }, 500);

      // ----- BOSS KEY TOGGLE -----
      function handlePanic(e) {
        if (!isActive || overlay.style.display !== 'none') return;
        if (e.key === panicKey) {
          e.preventDefault();
          e.stopPropagation();
          coverVisible = !coverVisible;
          coverView.style.display = coverVisible ? 'block' : 'none';
          
          // Refocus after toggle
          setTimeout(forceFocus, 50);
        }
      }

      // Listen on key trap
      keyTrap.addEventListener('keydown', handlePanic);
      keyTrap.addEventListener('keyup', (e) => {
        if (!isActive || overlay.style.display !== 'none') return;
        if (e.key === panicKey) {
          e.preventDefault();
          e.stopPropagation();
        }
      });

      // Also listen on document
      document.addEventListener('keydown', handlePanic);

      console.log('✅ Boss key ACTIVE — press your panic key anytime!');
      console.log(`🔑 Panic key set to: "${panicKey}"`);
    })();
  </script>

</body>
</html>
